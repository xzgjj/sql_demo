spring:
  datasource:
    url: jdbc:h2:mem:minidb;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:db/migration/V001__init_schema.sql
      data-locations: classpath:db/migration/V002__seed_data.sql
