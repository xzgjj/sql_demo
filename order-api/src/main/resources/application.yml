server:
  port: 8080

spring:
  application:
    name: order-api
  datasource:
    url: jdbc:mysql://localhost:3306/minidb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      max-lifetime: 1800000
      idle-timeout: 600000
      connection-timeout: 60000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

minidb:
  console:
    demo-enabled: true
  payment:
    mock-sign-secret: minidb-mock-pay-secret-key-2026
  order:
    payment-timeout-minutes: 30
    shard-count: 4
    proxy-mode: false
