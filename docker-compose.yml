services:
  mysql-primary:
    image: mysql:8.4
    container_name: minidb-primary
    environment:
      MYSQL_ROOT_PASSWORD: ${MINIDB_MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: minidb
    ports:
      - "4407:3306"
    command: --mysql-native-password=ON --authentication-policy=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 10

